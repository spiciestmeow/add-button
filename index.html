<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
:root {
     --page-bg: #ffffff;
}
 @media (prefers-color-scheme: dark) {
     :root {
         --page-bg: #191919;
    }
}

* {
    box-sizing: border-box; /* Critical for responsive padding */
}

 body {
     background-color: var(--page-bg);
     min-height: 100vh;
     display: flex;
     justify-content: center;
     align-items: center;
     font-family: system-ui, sans-serif;
     margin: 0;
     padding: 15px; /* Keeps card from touching screen edges on mobile */
}

 .card {
     background: #f8fafc;
     border: 1px solid #e2e8f0;
     border-radius: 12px;
     padding: 30px 5%; /* Percentage padding for internal scaling */
     width: 100%; 
     max-width: 340px; /* Limits desktop size to your original design */
     text-align: center;
}

 .hidden {
     display: none !important;
}

 .instruction {
     color: #64748b;
     font-size: 14px;
     margin-bottom: 20px;
}

 .btn {
     background: #50946E;
     color: #fff;
     border: none;
     padding: 12px 28px;
     border-radius: 10px;
     font-weight: 600;
     cursor: pointer;
     max-width: 100%; /* Prevents overflow */
}

 .btn:active {
     transform: scale(0.98);
}

/* Timer */
 .timer-icon {
     color: #50946E;
     font-size: 20px;
     margin-bottom: 8px;
}

 .timer-label {
     color: #64748b;
     font-size: 12px;
     font-weight: 600;
     text-transform: uppercase;
}

 .countdown-text {
     font-size: 32px;
     font-weight: 700;
     margin: 5px 0;
}

 .progress-bar {
     height: 3px;
     background: #e2e8f0;
     width: 80%; /* Increased for better mobile visibility */
     max-width: 200px;
     margin: 15px auto 0;
     overflow: hidden;
}

 .progress-fill {
     height: 100%;
     background: #50946E;
     width: 100%;
     transform: translateX(-100%);
     transition: transform 10s linear;
}

/* Credentials */
 .cred-header {
     text-align: left;
     font-size: 11px;
     font-weight: 700;
     color: #94a3b8;
     margin-bottom: 12px;
}

 .cred-box {
     background: #f1f5f9;
     padding: 12px 15px;
     border-radius: 8px;
     margin-bottom: 8px;
     text-align: left;
     position: relative;
     cursor: pointer;
     width: 100%;
     word-wrap: break-word; /* Prevents long emails from breaking the box */
}

 .label {
     font-size: 9px;
     color: #94a3b8;
     font-weight: 700;
}

 .value {
     font-size: 14px;
     font-family: monospace;
     padding-right: 25px; /* Ensures text doesn't overlap copy icon */
}

 .copy-icon {
     position: absolute;
     right: 15px;
     top: 50%;
     transform: translateY(-50%);
     color: #cbd5e1;
}

/* Updated Feedback Button Styles */
.feedback-btn {
    position: relative;
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: white;
    flex: 1;
    max-width: 120px;
    overflow: hidden; /* Keeps the progress bar inside the button */
    transition: transform 0.1s;
}

.feedback-btn:active {
    transform: scale(0.95);
}

.feedback-btn span {
    position: relative;
    z-index: 2; /* Keeps text above the loading bar */
}

/* The loading bar effect */
.feedback-btn::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.2); /* Darker overlay for the loading look */
    transform: translateX(-100%);
    z-index: 1;
}

/* Class to trigger animation */
.feedback-btn.loading::after {
    transform: translateX(0);
    transition: transform 1.5s ease-in-out;
}

/* Specific colors for your buttons */
.btn-green { background: #22c55e; }
.btn-red { background: #ef4444; }

.feedback-btn:disabled {
    cursor: not-allowed;
    opacity: 0.8;
}
 </style>
</head>
<body>
<div style="display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%;">
    <div class="card">
        <p id="instruction-text" class="instruction">Click below to unlock account details</p>

        <div id="view-initial">
            <button class="btn" onclick="startUnlock()">Get Account</button>
        </div>

        <div id="view-timer" class="hidden">
            <div id="timer-status-icon" class="timer-icon"><i class="fa-regular fa-clock"></i></div>
            <div id="status-text" class="timer-label">Initializing...</div>
            <div id="timer-num" class="countdown-text">10</div>
            <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
        </div>

        <div id="view-creds" class="hidden">
            <div class="cred-header">Credentials Unlocked</div>

            <div class="cred-box" onclick="smartCopy(this)">
                <div class="label">Email / User</div>
                <div class="value">Loading...</div>
                <i class="fa-regular fa-copy copy-icon"></i>
            </div>

            <div class="cred-box" onclick="smartCopy(this)">
                <div class="label">Password</div>
                <div class="value">Loading...</div>
                <i class="fa-regular fa-copy copy-icon"></i>
            </div>
        </div>
    </div>

    <div class="feedback-container">
        <p style="font-size: 12px; color: #64748b; margin-bottom: 10px;">
            Was this account working for you?
        </p>

        <div class="feedback-buttons">
            <button id="btn-working" class="feedback-btn btn-green" onclick="sendFeedback('working')">
                <span><i class="fa-solid fa-check"></i> Working</span>
            </button>
        
            <button id="btn-not-working" class="feedback-btn btn-red" onclick="sendFeedback('not_working')">
                <span><i class="fa-solid fa-xmark"></i> Not Working</span>
            </button>
        </div>
        
        <div id="feedback-msg" style="margin-top:10px; font-size:12px; color:#50946E; display:none;">
            Feedback submitted. Thank you!
        </div>
    </div>
</div>

<script>
let cachedData = null;
let isDataReady = false;

const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');
const API_URL = `/api/get-creds?token=${token}`;
const COOLDOWN_KEY = `finished_${token}`;

window.onload = () => {
    const sessionActive = localStorage.getItem('session_active');
    const finishTime = localStorage.getItem(COOLDOWN_KEY);
    const now = Date.now();
    const cooldownMs = 60000; 

    if (sessionActive === 'true') {
        const penaltyTime = Date.now();
        localStorage.setItem(COOLDOWN_KEY, penaltyTime);
        localStorage.removeItem('session_active');
        startBtnTimer(penaltyTime, cooldownMs);
        return;
    }

    if (finishTime && (now - finishTime < cooldownMs)) {
        startBtnTimer(finishTime, cooldownMs);
    }
};

const messages = [
    "Initializing secure connection...",
    "Contacting account server...",
    "Fetching account data...",
    "Decrypting credentials...",
    "Preparing access..."
];

async function sendFeedback(value) {
    const btnWorking = document.getElementById('btn-working');
    const btnNotWorking = document.getElementById('btn-not-working');
    const activeBtn = value === 'working' ? btnWorking : btnNotWorking;

    try {
        if (!token) return;

        // Disable buttons and start animation
        btnWorking.disabled = true;
        btnNotWorking.disabled = true;
        activeBtn.classList.add('loading');

        // Simultaneous API call and animation wait
        // We use a small delay so the user actually sees the bar fill up
        await Promise.all([
            fetch(`/api/feedback?token=${token}&feedback=${value}`, { method: 'POST' }),
            new Promise(resolve => setTimeout(resolve, 1500)) 
        ]);

        const msg = document.getElementById('feedback-msg');
        if (msg) {
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
                // Reset state
                activeBtn.classList.remove('loading');
                btnWorking.disabled = false;
                btnNotWorking.disabled = false;
            }, 2000);
        }

    } catch (err) {
        console.error(err);
        activeBtn.classList.remove('loading');
        btnWorking.disabled = false;
        btnNotWorking.disabled = false;
    }
}

function startUnlock() {
    const btn = document.querySelector('.btn');
    const statusEl = document.getElementById('status-text');
    const timerEl = document.getElementById('timer-num');
    const fill = document.getElementById('fill');

    btn.disabled = true;
    btn.innerText = "Processing...";

    fetch(API_URL)
    .then(res => res.json())
    .then(data => {
        cachedData = data;
        
        if (data.status === 'Expired') {
            btn.innerText = "Expired";
            return;
        }

        toggleView('timer');

        fill.style.transition = 'none'; 
        fill.style.transform = 'translateX(-100%)';
        
        void fill.offsetWidth; 

        fill.style.transition = 'transform 10s linear';
        fill.style.transform = 'translateX(0)';

        let time = 10;
        const interval = setInterval(() => {
            time--;
            timerEl.innerText = time;

            if (time === 8) statusEl.innerText = "Initializing secure connection...";
            if (time === 6) statusEl.innerText = "Contacting account server...";
            if (time === 4) statusEl.innerText = "Fetching account data...";
            if (time === 2) statusEl.innerText = "Preparing access...";

            if (time <= 0) {
                clearInterval(interval);
                statusEl.innerText = "SUCCESS!";
                document.getElementById('timer-status-icon').innerHTML = '<i class="fa-solid fa-circle-check"></i>';
                
                setTimeout(showCredentials, 200);
            }
        }, 1000);
    })
    .catch(err => {
        console.error(err);
        btn.disabled = false;
        btn.innerText = "Get Account";
    });
}

function startBtnTimer(finishTime, cooldownMs) {
    const btn = document.querySelector('.btn');
    btn.disabled = true;
    btn.style.opacity = "0.6";

    const refreshTimer = setInterval(() => {
        const now = Date.now();
        const remaining = Math.ceil((cooldownMs - (now - finishTime)) / 1000);
        
        if (remaining <= 0) {
            clearInterval(refreshTimer);
            btn.disabled = false;
            btn.innerText = "Get Account";
            btn.style.opacity = "1";
            localStorage.removeItem(COOLDOWN_KEY);
        } else {
            btn.innerText = `Wait ${remaining}s`;
        }
    }, 1000);
}

async function showCredentials() {
    document.getElementById('instruction-text').classList.add('hidden');
    toggleView('creds');
    fillData(cachedData);

    localStorage.setItem('session_active', 'true');

    let timeLeft = 30;
    const credsView = document.getElementById('view-creds');
    const header = document.querySelector('.cred-header');

    header.style.cssText = "font-size: 14px; font-weight: 600; color: #cbd5e1; text-transform: uppercase; margin-bottom: 12px;";
    header.innerHTML = `CREDENTIALS`;

    if (!document.getElementById('hurry-timer')) {
        const warning = document.createElement('div');
        warning.id = 'hurry-timer';
        warning.style.cssText = "color:#50946e; font-size:10px; font-weight:900; margin-top:15px; text-align:center; width:100%;";
        warning.innerHTML = `You have only <span id="live-seconds">30</span> seconds, hurry up!`;
        credsView.appendChild(warning);
    }

    const activeWindow = setInterval(() => {
        timeLeft--;
        const liveSecs = document.getElementById('live-seconds');
        if (liveSecs) liveSecs.innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(activeWindow);
            
            const finishTime = Date.now();
            localStorage.setItem(COOLDOWN_KEY, finishTime);
            localStorage.removeItem('session_active');
            
            toggleView('initial');
            document.getElementById('instruction-text').classList.remove('hidden');
            
            startBtnTimer(finishTime, 60000); 
        }
    }, 1000);
}
     
function fillData(data) {
    const values = document.querySelectorAll('.value');
    values[0].innerText = data.email;
    values[1].innerText = data.password;
    values.forEach(v => v.style.fontSize = "16px");
}

function toggleView(view) {
    document.getElementById('view-initial').classList.add('hidden');
    document.getElementById('view-timer').classList.add('hidden');
    document.getElementById('view-creds').classList.add('hidden');
    document.getElementById(`view-${view}`).classList.remove('hidden');
}

function smartCopy(el) {
    const text = el.querySelector('.value').innerText;
    navigator.clipboard.writeText(text).then(() => {
        const label = el.querySelector('.label');
        const original = label.innerText;
        label.innerText = "COPIED!";
        label.style.color = "#50946E";
        setTimeout(() => { label.innerText = original; label.style.color = "#94a3b8"; }, 1000);
    });
}
</script>

</body>
</html>
