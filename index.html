<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Card - Custom Dark Background</title>
    <style>
        /* 1. Define the Background Logic */
        :root {
            --page-bg: #ffffff; /* Default for Light Mode */
        }

        /* This triggers when your browser/system is in Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --page-bg: #191919; /* Your specific dark hex code */
            }
        }

        /* 2. Apply the Background */
        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--page-bg); 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 3. The Card (Stays light regardless of mode) */
        .card {
            background-color: #f8fafc; 
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 40px 60px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); /* Slightly stronger shadow for dark mode contrast */
        }

        .instruction {
            color: #64748b;
            font-size: 16px;
            margin-bottom: 24px;
            margin-top: 0;
        }

        .btn-link {
            text-decoration: none;
            display: inline-block;
        }

        /* 4. The Button (Stays #50946E, No Animation) */
        .btn {
            background-color: #50946E;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 14px 34px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(80, 148, 110, 0.35);
            
            /* No animations */
            transition: none;
            transform: none;
        }

        /* Force hover/active to be identical */
        .btn:hover, .btn:active {
            background-color: #50946E;
            transform: none;
            box-shadow: 0 4px 12px rgba(80, 148, 110, 0.35);
        }
    </style>
</head>
<body>

    <div class="card">
        <p class="instruction">Click below to unlock account details</p>
        
        <a href="https://your-url-here.com" class="btn-link">
            <button class="btn">Get Account</button>
        </a>
    </div>

</body>
</html>
