<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root {
     --page-bg: #ffffff;
}
 @media (prefers-color-scheme: dark) {
     :root {
         --page-bg: #191919;
    }
}
 body {
     background-color: var(--page-bg);
     height: 100vh;
     display: flex;
     justify-content: center;
     align-items: center;
     font-family: system-ui, sans-serif;
     margin: 0;
}
 .card {
     background: #f8fafc;
     border: 1px solid #e2e8f0;
     border-radius: 12px;
     padding: 30px 40px;
     width: 340px;
     text-align: center;
}
 .hidden {
     display: none !important;
}
 .instruction {
     color: #64748b;
     font-size: 14px;
     margin-bottom: 20px;
}
 .btn {
     background: #50946E;
     color: #fff;
     border: none;
     padding: 12px 28px;
     border-radius: 10px;
     font-weight: 600;
     cursor: pointer;
}
 .btn:active {
     transform: scale(0.98);
}
/* Timer */
 .timer-icon {
     color: #50946E;
     font-size: 20px;
     margin-bottom: 8px;
}
 .timer-label {
     color: #64748b;
     font-size: 12px;
     font-weight: 600;
     text-transform: uppercase;
}
 .countdown-text {
     font-size: 32px;
     font-weight: 700;
     margin: 5px 0;
}
 .progress-bar {
     height: 3px;
     background: #e2e8f0;
     width: 60%;
     margin: 15px auto 0;
     overflow: hidden;
}
 .progress-fill {
     height: 100%;
     background: #50946E;
     width: 100%;
     transform: translateX(-100%);
     transition: transform 10s linear;
}
/* Credentials */
 .cred-header {
     text-align: left;
     font-size: 11px;
     font-weight: 700;
     color: #94a3b8;
     margin-bottom: 12px;
}
 .cred-box {
     background: #f1f5f9;
     padding: 12px 15px;
     border-radius: 8px;
     margin-bottom: 8px;
     text-align: left;
     position: relative;
     cursor: pointer;
}
 .label {
     font-size: 9px;
     color: #94a3b8;
     font-weight: 700;
}
 .value {
     font-size: 14px;
     font-family: monospace;
}
 .copy-icon {
     position: absolute;
     right: 15px;
     top: 50%;
     transform: translateY(-50%);
     color: #cbd5e1;
}
 </style>
</head>
<body>

<div class="card">
    <p id="instruction-text" class="instruction">Click below to unlock account details</p>

    <div id="view-initial">
        <button class="btn" onclick="startUnlock()">Get Account</button>
    </div>

    <div id="view-timer" class="hidden">
        <div id="timer-status-icon" class="timer-icon"><i class="fa-regular fa-clock"></i></div>
        <div id="status-text" class="timer-label">Initializing...</div>
        <div id="timer-num" class="countdown-text">10</div>
        <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
    </div>

    <div id="view-creds" class="hidden">
        <div class="cred-header">Credentials Unlocked</div>

        <div class="cred-box" onclick="smartCopy(this)">
            <div class="label">Email / User</div>
            <div class="value">Loading...</div>
            <i class="fa-regular fa-copy copy-icon"></i>
        </div>

        <div class="cred-box" onclick="smartCopy(this)">
            <div class="label">Password</div>
            <div class="value">Loading...</div>
            <i class="fa-regular fa-copy copy-icon"></i>
        </div>
    </div>
</div>

<script>
let cachedData = null;
let isDataReady = false;

const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');
const API_URL = `/api/get-creds?token=${token}`;
const COOLDOWN_KEY = `finished_${token}`;

// 1. On Load: ONLY trigger the 60s wait if they already finished the process recently
window.onload = () => {
    const finishTime = localStorage.getItem(COOLDOWN_KEY);
    const now = Date.now();
    const cooldownMs = 60000; 

    if (finishTime && (now - finishTime < cooldownMs)) {
        const remaining = Math.ceil((cooldownMs - (now - finishTime)) / 1000);
        
        // Lock the button and show the countdown
        const btn = document.querySelector('.btn');
        btn.disabled = true;
        btn.style.opacity = "0.6";
        btn.innerText = `Wait ${remaining}s`;

        const refreshTimer = setInterval(() => {
            const currentNow = Date.now();
            const currentRemaining = Math.ceil((cooldownMs - (currentNow - finishTime)) / 1000);
            
            if (currentRemaining <= 0) {
                clearInterval(refreshTimer);
                btn.disabled = false;
                btn.innerText = "Get Account";
                btn.style.opacity = "1";
                localStorage.removeItem(COOLDOWN_KEY);
            } else {
                btn.innerText = `Wait ${currentRemaining}s`;
            }
        }, 1000);
    }
};

const messages = [
    "Initializing secure connection...",
    "Contacting account server...",
    "Fetching account data...",
    "Decrypting credentials...",
    "Preparing access..."
];

function startUnlock() {
    const btn = document.querySelector('.btn');
    const statusEl = document.getElementById('status-text');
    const icon = document.getElementById('timer-status-icon');
    const timerEl = document.getElementById('timer-num');

    // Prevent double-clicking while the 10s timer is active
    btn.disabled = true;
    btn.innerText = "Processing...";

    fetch(API_URL)
    .then(res => res.json())
    .then(data => {
        cachedData = data;
        
        if (data.status === 'Expired') {
            btn.innerText = "Expired";
            return;
        }

        // --- START YOUR 10s TIMER ---
        toggleView('timer');
        setTimeout(() => document.getElementById('fill').style.transform = 'translateX(0)', 50);

        let time = 10;
        const interval = setInterval(() => {
            time--;
            timerEl.innerText = time;

            if (time === 8) statusEl.innerText = "Initializing secure connection...";
            if (time === 6) statusEl.innerText = "Contacting account server...";
            if (time === 4) statusEl.innerText = "Fetching account data...";
            if (time === 2) statusEl.innerText = "Preparing access...";

            if (time <= 0) {
                clearInterval(interval);
                statusEl.innerText = "SUCCESS!";
                icon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
                
                // SAVE FINISH TIME: This is what triggers the cooldown ONLY on refresh
                localStorage.setItem(COOLDOWN_KEY, Date.now());

                setTimeout(showCredentials, 200);
            }
        }, 1000);
    })
    .catch(err => {
        console.error(err);
        btn.disabled = false;
        btn.innerText = "Get Account";
    });
}

// Helper function to handle the 60s button countdown
function startBtnTimer(seconds) {
    const btn = document.querySelector('.btn');
    btn.disabled = true;
    btn.style.opacity = "0.6";
    btn.innerText = `Wait ${seconds}s`;

    const timer = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            btn.innerText = "Get Account";
            btn.style.opacity = "1";
            // Optional: Don't remove from localStorage until they actually click again
        } else {
            btn.innerText = `Wait ${seconds}s`;
        }
    }, 1000);
}

async function showCredentials() {
    document.getElementById('instruction-text').classList.add('hidden');
    toggleView('creds');

    try {
        let waitTime = 0;
        while (!cachedData && waitTime < 3000) {
            await new Promise(r => setTimeout(r, 200));
            waitTime += 200;
        }

        if (!cachedData) {
            const res = await fetch(API_URL);
            cachedData = await res.json();
        }

        fillData(cachedData);

    } catch {
        const values = document.querySelectorAll('.value');
        values[0].innerText = "Error";
        values[1].innerText = "Try again";
    }
}

function fillData(data) {
    const values = document.querySelectorAll('.value');
    values[0].innerText = data.email;
    values[1].innerText = data.password;
    values.forEach(v => v.style.fontSize = "16px");
}

function toggleView(view) {
    document.getElementById('view-initial').classList.add('hidden');
    document.getElementById('view-timer').classList.add('hidden');
    document.getElementById('view-creds').classList.add('hidden');
    document.getElementById(`view-${view}`).classList.remove('hidden');
}

function smartCopy(el) {
    const text = el.querySelector('.value').innerText;
    navigator.clipboard.writeText(text).then(() => {
        const label = el.querySelector('.label');
        const original = label.innerText;
        label.innerText = "COPIED!";
        label.style.color = "#50946E";
        setTimeout(() => {
            label.innerText = original;
            label.style.color = "#94a3b8";
        }, 1000);
    });
}
</script>

</body>
</html>
