<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
<style>
.card {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #f4f6f9; /* Light grey/blue background */
  border: 1px solid #e0e4e9;
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  max-width: 500px;
  margin: 20px auto;
}

/* Text styling */
.instruction {
  color: #5a6b7d; /* Muted slate color */
  font-size: 16px;
  margin-bottom: 24px;
}

/* Button styling */
.btn {
  background-color: #d92323; /* Bright red */
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px 32px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: background-color 0.2s ease;
  
  /* Soft shadow to match the image */
  box-shadow: 0 4px 15px rgba(217, 35, 35, 0.3);
}

/* Hover effect for better UX */
.btn:hover {
  background-color: #b31d1d;
}
</style>
</head>
<body>

<div class="card">
  <p class="instruction">Click below to unlock account details</p>
  <button class="btn">Get Account</button>
</div>

</body>
</html>
