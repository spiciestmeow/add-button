<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Background Card</title>
    <style>
        /* Define colors based on system theme */
        :root {
            --page-bg: #ffffff; /* Default white for light mode */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --page-bg: #121212; /* Dark color for dark mode */
            }
        }

        html, body {
            margin: 0;
            padding: 0;
            /* This will now switch between white and dark gray automatically */
            background-color: var(--page-bg); 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* The Card - This stays light even in dark mode */
        .card {
            background-color: #f8fafc; 
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 40px 60px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .instruction {
            color: #64748b;
            font-size: 16px;
            margin-bottom: 24px;
            margin-top: 0;
        }

        .btn-link {
            text-decoration: none;
            display: inline-block;
        }

        /* The Button - Stays #50946E */
        .btn {
            background-color: #50946E;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 14px 34px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(80, 148, 110, 0.35);
            transition: none;
            transform: none;
        }

        /* Static states */
        .btn:hover, .btn:active {
            background-color: #50946E;
            transform: none;
            box-shadow: 0 4px 12px rgba(80, 148, 110, 0.35);
        }
    </style>
</head>
<body>

    <div class="card">
        <p class="instruction">Click below to unlock account details</p>
        <a href="https://your-url-here.com" class="btn-link">
            <button class="btn">Get Account</button>
        </a>
    </div>

</body>
</html>
