<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root { --page-bg: #ffffff; }
@media (prefers-color-scheme: dark) { :root { --page-bg: #191919; } }

body {
    background-color: var(--page-bg);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: system-ui, sans-serif;
    margin: 0;
}

.card {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 30px 40px;
    width: 340px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}

.hidden { display: none !important; }

.instruction { color: #64748b; font-size: 14px; margin-bottom: 20px; }

.btn {
    background: #50946E;
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
}
.btn:active { transform: scale(0.98); }

/* Timer */
.timer-icon { color: #50946E; font-size: 20px; margin-bottom: 8px; }
.timer-label { color: #64748b; font-size: 12px; font-weight: 600; text-transform: uppercase; }
.countdown-text { font-size: 32px; font-weight: 700; margin: 5px 0; }

.progress-bar {
    height: 3px;
    background: #e2e8f0;
    width: 60%;
    margin: 15px auto 0;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: #50946E;
    width: 100%;
    transform: translateX(-100%);
    transition: transform 10s linear;
}

/* Credentials */
.cred-header {
    font-size: 16px;      /* bigger header */
    font-weight: 700;
    color: #334155;
    text-align: left;
    margin-bottom: 12px;
}

.cred-box {
    background: #f1f5f9;
    padding: 12px 15px;
    border-radius: 8px;
    margin-bottom: 8px;
    position: relative;   /* required for absolute icon */
    cursor: pointer;
    display: flex;        /* new: flex layout */
    justify-content: space-between; /* space between value and icon */
    align-items: center;  /* vertically center icon and value */
}


.label {
    font-size: 13px;      /* bigger label */
    font-weight: 700;
    color: #64748b;
    margin-bottom: 4px;
}

.value {
    font-size: 16px;
    font-family: monospace;
    text-align: left;     /* left-aligned text */
    color: #334155;
    font-weight: 600;
}
    
.copy-icon {
    color: #cbd5e1;
    font-size: 14px;
    margin-left: 10px;    /* space between value and icon */
}
</style>
</head>

<body>

<div class="card">
    <p id="instruction-text" class="instruction">Click below to unlock account details</p>

    <div id="view-initial">
        <button class="btn" onclick="startUnlock()">Get Account</button>
    </div>

    <div id="view-timer" class="hidden">
        <div id="timer-status-icon" class="timer-icon"><i class="fa-regular fa-clock"></i></div>
        <div id="status-text" class="timer-label">Initializing...</div>
        <div id="timer-num" class="countdown-text">10</div>
        <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
    </div>

    <div id="view-creds" class="hidden">
        <div class="cred-header">Credentials</div>

        <div class="cred-box" onclick="smartCopy(this)">
            <div class="label">Email</div>
            <div class="value">Loading...</div>
        </div>

        <div class="cred-box" onclick="smartCopy(this)">
            <div class="label">Password</div>
            <div class="value">Loading...</div>
        </div>
    </div>
</div>

<script>
let cachedData = null;
let isDataReady = false;

const API_URL = 'https://secure-creds-api.vercel.app/api/get-creds';

const messages = [
    "Initializing secure connection...",
    "Contacting account server...",
    "Fetching account data...",
    "Decrypting credentials...",
    "Preparing access..."
];

function startUnlock() {
    // Show timer view
    toggleView('timer');
    // Keep instruction visible here
    document.getElementById('instruction-text').classList.remove('hidden');

    // 🔥 Prefetch immediately
    fetch(API_URL)
    .then(res => {
        if (!res.ok) throw new Error("Network error");
        return res.json();
    })
    .then(data => {
        console.log("Prefetch success:", data);
        cachedData = data;
        isDataReady = true;
    })
    .catch(err => console.error("Prefetch failed:", err));

    // Progress bar animation
    setTimeout(() => document.getElementById('fill').style.transform = 'translateX(0)', 50);

    const status = document.getElementById('status-text');
    const icon = document.getElementById('timer-status-icon');
    const timerEl = document.getElementById('timer-num');

    let time = 10;

    const interval = setInterval(() => {
        time--;
        timerEl.innerText = time;

        if (time === 8) status.innerText = messages[0];
        if (time === 6) status.innerText = messages[1];
        if (time === 4) status.innerText = messages[2];
        if (time === 2) status.innerText = isDataReady ? "Credentials ready..." : "Waiting for server...";
        if (time === 1) status.innerText = messages[4];

        if (time <= 0) {
            clearInterval(interval);
            status.innerText = "SUCCESS!";
            icon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
            setTimeout(showCredentials, 200);
        }
    }, 1000);
}

async function showCredentials() {
    // Hide instruction in credentials view
    document.getElementById('instruction-text').classList.add('hidden');

    toggleView('creds');

    try {
        // Wait for prefetch (up to 3s)
        let waitTime = 0;
        while (!cachedData && waitTime < 3000) {
            await new Promise(r => setTimeout(r, 200));
            waitTime += 200;
        }

        if (!cachedData) {
            console.log("Fallback fetch triggered...");
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error("Network error");
            cachedData = await res.json();
        }

        fillData(cachedData);

    } catch (err) {
        console.error("Final error:", err);

        // Retry once
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            fillData(data);
        } catch {
            const values = document.querySelectorAll('.value');
            values[0].innerText = "Connection error";
            values[1].innerText = "Retry again";
        }
    }
}

function fillData(data) {
    const values = document.querySelectorAll('.value');
    values[0].innerText = data.email;
    values[1].innerText = data.password;

    // Make credential values slightly bigger
    values.forEach(v => v.style.fontSize = "16px");
}

function toggleView(view) {
    document.getElementById('view-initial').classList.add('hidden');
    document.getElementById('view-timer').classList.add('hidden');
    document.getElementById('view-creds').classList.add('hidden');

    document.getElementById(`view-${view}`).classList.remove('hidden');
}

function smartCopy(el) {
    const text = el.querySelector('.value').innerText;
    navigator.clipboard.writeText(text).then(() => {
        const label = el.querySelector('.label');
        const original = label.innerText;
        label.innerText = "COPIED!";
        label.style.color = "#50946E";
        setTimeout(() => {
            label.innerText = original;
            label.style.color = "#94a3b8";
        }, 1000);
    });
}
</script>

</body>
</html>
