<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
<style>
/* Container styling stays the same, or matches the new mood */
.card {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #f8fafc; 
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 40px 60px;
  text-align: center;
  max-width: 500px;
  margin: 20px auto;
}

/* Updated Button with #50946E */
.btn {
  background-color: #50946E; /* Your new custom color */
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px 32px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  
  /* Adjusted shadow to match #50946E with 30% opacity */
  box-shadow: 0 4px 15px rgba(80, 148, 110, 0.3);
}

/* Hover state for the new color */
.btn:hover {
  background-color: #437d5d; /* Slightly darker shade for feedback */
  transform: translateY(-1px); /* Adds a nice subtle lift */
  box-shadow: 0 6px 20px rgba(80, 148, 110, 0.4);
}
</style>
</head>
<body>

<div class="card">
  <p class="instruction">Click below to unlock account details</p>
  <button class="btn">Get Account</button>
</div>

</body>
</html>
