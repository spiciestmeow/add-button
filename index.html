<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --page-bg: #ffffff; }
        @media (prefers-color-scheme: dark) { :root { --page-bg: #191919; } }

        body {
            background-color: var(--page-bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
        }

        .card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 30px 40px;
            width: 360px; /* Slightly slimmer card */
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            text-align: center;
        }

        .hidden { display: none !important; }

        /* Instruction Text - Always Visible */
        .instruction {
            color: #64748b;
            font-size: 14px; /* Smaller font */
            margin-bottom: 20px;
            margin-top: 0;
        }

        /* VIEW 1: Button */
        .btn {
            background-color: #50946E;
            color: #ffffff; border: none; padding: 12px 28px;
            border-radius: 10px; font-weight: 600; font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(80, 148, 110, 0.3);
        }

        /* VIEW 2: Timer - Scaled Down */
        .timer-icon { color: #50946E; font-size: 20px; margin-bottom: 8px; }
        .timer-label { color: #64748b; font-size: 13px; margin: 0; }
        .countdown-text { 
            font-size: 32px; /* Reduced from 48px */
            font-weight: 700; 
            margin: 5px 0; 
            color: #1e293b; 
        }
        .progress-bar {
            height: 3px; background: #e2e8f0; border-radius: 2px;
            width: 60%; margin: 15px auto 0; overflow: hidden; position: relative;
        }
        .progress-fill {
            position: absolute; height: 100%; background: #50946E;
            width: 100%; left: -100%; transition: left 10s linear;
        }

        /* VIEW 3: Credentials - Scaled Down */
        .cred-header { 
            text-align: left; font-size: 11px; font-weight: 700; 
            color: #94a3b8; margin-bottom: 12px; text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        .cred-box { 
            background: #f1f5f9; padding: 12px 15px; 
            border-radius: 8px; margin-bottom: 8px; 
            text-align: left; position: relative; 
        }
        .label { font-size: 9px; color: #94a3b8; font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
        .value { font-size: 14px; color: #334155; font-family: 'Courier New', Courier, monospace; font-weight: 600; }
        .copy-icon { 
            position: absolute; right: 15px; top: 50%; 
            transform: translateY(-50%); color: #cbd5e1; 
            font-size: 14px; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="card">
        <p class="instruction">Click below to unlock account details</p>

        <div id="view-initial">
            <button class="btn" onclick="startUnlock()">Get Account</button>
        </div>

        <div id="view-timer" class="hidden">
            <div class="timer-icon"><i class="fa-regular fa-clock"></i></div>
            <p class="timer-label">Unlocking in</p>
            <div id="timer-num" class="countdown-text">10</div>
            <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
        </div>

        <div id="view-creds" class="hidden">
            <div class="cred-header">Credentials</div>
            <div class="cred-box">
                <div class="label">Email</div>
                <div class="value">63813714</div>
                <i class="fa-regular fa-copy copy-icon"></i>
            </div>
            <div class="cred-box">
                <div class="label">Password</div>
                <div class="value">92013398</div>
                <i class="fa-regular fa-copy copy-icon"></i>
            </div>
        </div>
    </div>

    <script>
        function startUnlock() {
            document.getElementById('view-initial').classList.add('hidden');
            document.getElementById('view-timer').classList.remove('hidden');
            setTimeout(() => { document.getElementById('fill').style.left = '0'; }, 50);

            let timeLeft = 10;
            const timerDisplay = document.getElementById('timer-num');
            const countdown = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    showCredentials();
                }
            }, 1000);
        }

        function showCredentials() {
            document.getElementById('view-timer').classList.add('hidden');
            document.getElementById('view-creds').classList.remove('hidden');
        }
    </script>
</body>
</html>
